name: OWASP A01 - Access to Config Files
id: 80955fa2-95b2-4bf9-b1a8-e8c0c970f3b9
version: 2
date: "2026-04-03"
type: TTP
status: production
description: "Попытка прочитать .env, config.php, .git и другие чувствительные файлы через JSON-логи API."

search: |
  index="main"
  | spath input=_raw
  | eval src_ip = coalesce(client_ip, src_ip)
  | eval login_path = coalesce(path, uri)
  | where match(login_path, "(?i)\.(env|git|config|passwd|htpasswd|bak|old)$")
    OR like(login_path, "%/etc/passwd%")
    OR like(login_path, "%/.git/%")
    OR like(login_path, "%/config.php%")
  | stats count, values(login_path) as paths by src_ip, status_code
  | rename status_code as status
  | where count > 0

how_to_implement: |
  Логи должны быть в JSON-формате и содержать поля:
  client_ip, path, status_code, event_type.
  Убедись что index="main" содержит логи с event_type="api_request".

known_false_positives: |
  Сканеры уязвимостей (Nessus, OpenVAS).
  Легитимные запросы к конфигурационным файлам разработчиков.

references:
  - https://owasp.org/Top10/A01_2021-Broken_Access_Control/

tags:
  analytic_story:
    - OWASP Top 10 2021
  mitre_attack:
    - T1190
  security_domain: web
  risk_score: 65
  severity: high
  confidence: medium
  affected_field: path
  log_format: json
  tested: "2026-04-03"
