name: OWASP A05 - Default Credentials Page
id: f7366b70-47e8-4f72-99e2-e35af8965131
version: 2
date: "2026-04-03"
type: TTP
status: production
description: "Доступ к стандартным панелям администрирования (/admin, /setup и т.д.) в JSON-логах API."

search: |
  index="main"
  | spath input=_raw
  | eval src_ip = coalesce(client_ip, src_ip)
  | eval login_path = coalesce(path, uri)
  | eval auth_status = coalesce(status_code, status)
  | where (login_path="/admin" OR login_path="/administrator" OR login_path="/dashboard"
    OR login_path="/setup" OR login_path="/config" OR login_path="/wp-admin"
    OR login_path="/phpmyadmin" OR login_path="/panel" OR login_path="/cpanel")
    AND auth_status=200
  | stats count, values(login_path) as paths by src_ip, auth_status
  | rename auth_status as status
  | where count > 0

how_to_implement: |
  Логи должны быть в JSON-формате и содержать поля:
  client_ip, path, status_code, event_type.
  Убедись что index="main" содержит логи с event_type="api_request".

known_false_positives: |
  Легитимный доступ администраторов.
  Системы мониторинга с проверкой доступности панелей.

references:
  - https://owasp.org/Top10/A05_2021-Security_Misconfiguration/

tags:
  analytic_story:
    - OWASP Top 10 2021
  mitre_attack:
    - T1190
  security_domain: web
  risk_score: 70
  severity: high
  confidence: high
  affected_field: path
  log_format: json
  tested: "2026-04-03"
