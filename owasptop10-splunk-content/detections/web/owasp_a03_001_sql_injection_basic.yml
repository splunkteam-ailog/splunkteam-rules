name: OWASP A03 - SQL Injection (Basic)
id: 41f946a9-3b72-4f51-9afb-8f8685e89daf
version: 1
date: "2026-03-31"
type: TTP
status: production
description: "Классические SQLi: OR 1=1, UNION, DROP и т.д."
search: |
  web_logs 
  | rex field=uri "(?i)(union\s+select|or\s+1=1|drop\s+table|delete\s+from|update\s+\w+\s+set|truncate\s+table)"
  | where isnotnull(_raw) 
  | stats count by src_ip, uri, status
how_to_implement: Макрос web_logs должен включать uri и _raw.
known_false_positives: Легитимные запросы с SQL-ключевыми словами в URL (редко).
references:
  - https://owasp.org/Top10/A03_2021-Injection/
tags:
  analytic_story:
    - OWASP Top 10 2021
  mitre_attack:
    - T1190
  security_domain: web
  risk_score: 85
  severity: critical
  confidence: high
