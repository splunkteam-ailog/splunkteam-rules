name: OWASP A07 - Credential Stuffing
id: a0649009-099f-4528-921d-d144a30c5c27
version: 2
date: "2026-04-03"
type: Anomaly
status: production
description: "Один IP использует много разных логинов (более 5 за 5 минут) в JSON-логах API."

search: |
  index="main"
  | spath input=_raw
  | eval src_ip = coalesce(client_ip, src_ip)
  | eval login_path = coalesce(path, uri)
  | eval auth_status = coalesce(status_code, status)
  | where (login_path="/api/login" OR login_path="/login" OR login_path="/auth")
    AND (auth_status=401 OR auth_status=403)
  | stats dc(username) as unique_users, values(username) as usernames by src_ip
  | where unique_users > 5

how_to_implement: |
  Логи должны быть в JSON-формате и содержать поля:
  client_ip, path, status_code, username, event_type.
  Убедись что index="main" содержит логи с event_type="login_failed".

known_false_positives: |
  Прокси или NAT где множество пользователей выходят с одного IP.
  Корпоративные сети с о
