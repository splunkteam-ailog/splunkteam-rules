name: OWASP A07 - Credential Stuffing
id: a0649009-099f-4528-921d-d144a30c5c27
version: 1
date: "2026-03-31"
type: Anomaly
status: production
description: Один IP использует много разных логинов (более 5 за 5 минут)
search: |
  web_logs 
  | where uri="/login" AND status IN (401, 403)
  | bin _time span=5m 
  | stats dc(user) as unique_users by src_ip, _time 
  | where unique_users > 5
