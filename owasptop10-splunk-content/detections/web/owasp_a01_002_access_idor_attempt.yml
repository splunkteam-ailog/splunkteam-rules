description: Insecure Direct Object Reference
search: |
  web_logs 
  | rex field=uri "\/users\/(?<requested_id>[^\/\?]+)" 
  | where requested_id != authenticated_user OR isnull(authenticated_user)
  | stats count by src_ip, uri, requested_id, authenticated_user, _time
how_to_implement: Убедитесь, что поле authenticated_user извлекается из сессии/токена (например, через lookup или CIM).
known_false_positives: Легитимный доступ администратора к чужим профилям. Настройте lookup исключений.
